<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Product Detail</title>
    <style>
      #notification {
        display: none;
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        z-index: 60;
        width: min(100%, 24rem);
        border-radius: 1rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      #notification .notification-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      #notification button {
        min-width: 5rem;
      }
    </style>
</head>
<body class="bg-black text-white">
<div id="notification"></div>
    <div class="bg-blue-800 shadow-lg">
        <div class="flex items-center justify-between h-auto sm:h-20 px-3 sm:px-6 py-3 sm:py-0 flex-wrap sm:flex-nowrap gap-3 sm:gap-0">
            <div class="text-xl sm:text-2xl font-bold text-white">Dashboard</div>
            <div class="text-center flex-1 order-3 sm:order-none w-full sm:w-auto mt-2 sm:mt-0">
                <p class="text-lg sm:text-2xl font-bold text-white">Product Detail</p>
            </div>
            <div class="flex gap-2 sm:gap-4 flex-wrap sm:flex-nowrap justify-end">
                <button onclick="window.location.href='index.html'" class="bg-blue-600 hover:bg-blue-700 text-white px-2 sm:px-4 py-2 rounded text-sm sm:text-base transition-colors">Back to Dashboard</button>
            </div>
        </div>
    </div>

    <section class="py-10 sm:py-20 px-4 sm:px-0">
        <div class="container mx-auto">
            <div id="product-detail" class="bg-gray-900 p-6 sm:p-8 rounded-lg shadow-lg border border-blue-500 max-w-4xl mx-auto">
                <!-- Product detail content will be loaded here -->
            </div>
        </div>
    </section>

    <script src="js/product.js"></script>
    <script src="buy.js"></script>
    <script src="wishlist.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        if (productId) {
            fetchProducts().then(() => loadProductDetail(productId));
        } else {
            document.getElementById('product-detail').innerHTML = '<p class="text-center text-white">Product not found.</p>';
        }

        function loadProductDetail(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                document.getElementById('product-detail').innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8">
                        <div class="text-center">
                            <img src="${product.image}" alt="${product.title}" class="w-full max-w-sm mx-auto rounded-lg shadow-md">
                        </div>
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-bold text-blue-400 mb-4">${product.title}</h1>
                            <p class="text-lg font-semibold text-green-400 mb-4">$${product.price.toFixed(2)}</p>
                            <p class="text-sm text-gray-300 mb-4">${product.category}</p>
                            <p class="text-base text-white mb-6">${product.description}</p>
                            <div class="flex flex-col sm:flex-row items-center gap-4">
                                <input type="number" id="qty-${product.id}" min="1" max="10" value="1" class="bg-gray-800 text-white border border-blue-500 rounded px-3 py-2 w-20 text-center">
                                <button onclick="buyProduct(${product.id})" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors">Buy Now</button>
                                <button onclick="addToWishlist(${product.id})" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded transition-colors">Add to Wishlist</button>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                document.getElementById('product-detail').innerHTML = '<p class="text-center text-white">Product not found.</p>';
            }
        }
    </script>
</body>
</html>
