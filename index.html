<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dist/style.css">
    <title>Dashboard</title>
</head>
<body class="bg-black">
<div class="bg-blue-800 shadow-lg">
  <div class="flex items-center justify-between h-20 px-6">
    <div class="text-2xl font-bold text-white">Dashboard</div>
    <div class="text-center flex-1">
      <p class="text-2xl font-bold text-white">Welcome to the dashboard !</p>
    </div>
    <div class="flex space-x-4">
      <button onclick="openWishlistModal()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded transition-colors">My Wishlist</button>
      <button onclick="logout()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors">Logout</button>
      <button onclick="login()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors">Login</button>
    </div>
  </div>
</div>

<section class="bg-gradient-to-r from-blue-800 to-black text-white py-20">
  <div class="container mx-auto text-center px-6">
    <h1 class="text-5xl font-bold mb-4">Discover Amazing Products</h1>
    <p class="text-xl mb-8">Explore our curated collection of high-quality items from various categories.</p>
    <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition-colors">Shop Now</button>
  </div>
</section>



<div id="container" class="p-6">
    <div id="product-container">
        <h2 class="text-3xl font-semibold mb-6 text-white">Products</h2>
        <div id="products" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </div>
</div>

<!-- Buy Modal -->
<div id="buyModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-gray-900 p-8 rounded-lg shadow-lg border border-blue-500 max-w-md w-full">
    <h2 class="text-2xl font-bold text-white mb-4">Confirm Purchase</h2>
    <div id="buyModalContent" class="text-white mb-6">
    </div>
    <div class="flex space-x-4">
      <button onclick="confirmBuy()" class="flex-1 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded transition-colors">Confirm</button>
      <button onclick="closeBuyModal()" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded transition-colors">Cancel</button>
    </div>
  </div>
</div>

<!-- Wishlist Modal -->
<div id="wishlistModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-gray-900 p-8 rounded-lg shadow-lg border border-blue-500 max-w-4xl w-full max-h-screen overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-white">My Wishlist</h2>
      <button onclick="closeWishlistModal()" class="text-white text-2xl hover:text-gray-400">&times;</button>
    </div>
    <div id="wishlistModalContent" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
    </div>
    <div id="wishlistTotal" class="text-right text-white text-xl font-bold mb-4"></div>
    <button onclick="closeWishlistModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors">Close</button>
  </div>
</div>




<script src="dist/js/session.js"></script>
<script src="dist/js/product.js"></script>
<script src="dist/buy.js"></script>
<script src="dist/wishlist.js"></script>
    <script>
        const name = sessionStorage.getItem("name");
        if (name) {
            document.querySelector("p").textContent = `Welcome ${name} to the dashboard !`;
        }
    </script>
</body>




</html>
