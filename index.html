<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dist/style.css">
    <title>Dashboard</title>
</head>
<body class="bg-black">
<div class="bg-blue-800 shadow-lg">
  <div class="flex items-center justify-between h-auto sm:h-20 px-3 sm:px-6 py-3 sm:py-0 flex-wrap sm:flex-nowrap gap-3 sm:gap-0">
    <div class="text-xl sm:text-2xl font-bold text-white">Dashboard</div>
    <div class="text-center flex-1 order-3 sm:order-none w-full sm:w-auto mt-2 sm:mt-0">
      <p class="text-lg sm:text-2xl font-bold text-white">Welcome to the dashboard !</p>
    </div>
    <div class="flex gap-2 sm:gap-4 flex-wrap sm:flex-nowrap justify-end">
      <button onclick="openWishlistModal()" class="bg-green-600 hover:bg-green-700 text-white px-2 sm:px-4 py-2 rounded text-sm sm:text-base transition-colors">Wishlist</button>
      <button onclick="logout()" class="bg-blue-600 hover:bg-blue-700 text-white px-2 sm:px-4 py-2 rounded text-sm sm:text-base transition-colors">Logout</button>
      <button onclick="login()" class="bg-blue-600 hover:bg-blue-700 text-white px-2 sm:px-4 py-2 rounded text-sm sm:text-base transition-colors">Login</button>
    </div>
  </div>
</div>

<section class="bg-gradient-to-r from-blue-800 to-black text-white py-10 sm:py-20 px-4 sm:px-0">
  <div class="container mx-auto text-center">
    <h1 class="text-3xl sm:text-5xl font-bold mb-3 sm:mb-4">Discover Amazing Products</h1>
    <p class="text-base sm:text-xl mb-6 sm:mb-8">Explore our curated collection of high-quality items from various categories.</p>
    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 sm:px-6 py-2 sm:py-3 rounded-lg text-sm sm:text-base transition-colors">Shop Now</button>
  </div>
</section>



<div id="container" class="p-3 sm:p-6">
    <div id="product-container">
        <h2 class="text-2xl sm:text-3xl font-semibold mb-4 sm:mb-6 text-white">Products</h2>
        <div id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-6">
        </div>
    </div>
</div>

<!-- Buy Modal -->
<div id="buyModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 sm:p-0">
  <div class="bg-gray-900 p-6 sm:p-8 rounded-lg shadow-lg border border-blue-500 w-full max-w-sm sm:max-w-md">
    <h2 class="text-xl sm:text-2xl font-bold text-white mb-4">Confirm Purchase</h2>
    <div id="buyModalContent" class="text-white mb-6 text-sm sm:text-base">
    </div>
    <div class="flex gap-2 sm:gap-4 flex-col sm:flex-row">
      <button onclick="confirmBuy()" class="flex-1 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded transition-colors text-sm sm:text-base">Confirm</button>
      <button onclick="closeBuyModal()" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded transition-colors text-sm sm:text-base">Cancel</button>
    </div>
  </div>
</div>

<!-- Wishlist Modal -->
<div id="wishlistModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 sm:p-0">
  <div class="bg-gray-900 p-4 sm:p-8 rounded-lg shadow-lg border border-blue-500 w-full max-w-2xl max-h-screen overflow-y-auto">
    <div class="flex justify-between items-center mb-4 sm:mb-6">
      <h2 class="text-xl sm:text-2xl font-bold text-white">My Wishlist</h2>
      <button onclick="closeWishlistModal()" class="text-white text-2xl hover:text-gray-400">&times;</button>
    </div>
    <div id="wishlistModalContent" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4 mb-4 sm:mb-6">
    </div>
    <div id="wishlistTotal" class="text-right text-white text-lg sm:text-xl font-bold mb-4"></div>
    <button onclick="closeWishlistModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors text-sm sm:text-base">Close</button>
  </div>
</div>




<script src="dist/js/session.js"></script>
<script src="dist/js/product.js"></script>
<script src="dist/buy.js"></script>
<script src="dist/wishlist.js"></script>
    <script>
        const name = sessionStorage.getItem("name");
        if (name) {
            document.querySelector("p").textContent = `Welcome ${name} to the dashboard !`;
        }
    </script>
</body>




</html>
